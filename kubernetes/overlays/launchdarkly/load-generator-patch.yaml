apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
spec:
  template:
    spec:
      containers:
      - name: load-generator
        image: ghcr.io/open-telemetry/demo:latest-load-generator
        resources:
          requests:
            memory: "3000Mi"
          limits:
            memory: "3000Mi"
